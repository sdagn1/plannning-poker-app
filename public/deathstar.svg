<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <clipPath id="sphere">
      <circle cx="32" cy="32" r="30" />
    </clipPath>
    <radialGradient id="shade" cx="38%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="70%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#0d0d0d" />
    </radialGradient>
  </defs>

  <!-- Sphere body -->
  <circle cx="32" cy="32" r="30" fill="url(#shade)" stroke="#4a4a4a" stroke-width="2" />

  <g clip-path="url(#sphere)" stroke="#2e2e2e" fill="none">
    <!-- Equatorial trench -->
    <line x1="0" y1="37" x2="64" y2="37" stroke-width="2" />
    <line x1="0" y1="34.5" x2="64" y2="34.5" stroke-width="1" opacity="0.7" />
    <line x1="0" y1="39.5" x2="64" y2="39.5" stroke-width="1" opacity="0.7" />

    <!-- Latitude panel lines -->
    <path d="M2 24 Q32 20 62 24" stroke-width="0.8" opacity="0.5" />
    <path d="M4 48 Q32 52 60 48" stroke-width="0.8" opacity="0.5" />
    <path d="M6 55 Q32 58 58 55" stroke-width="0.7" opacity="0.4" />

    <!-- Longitude panel lines -->
    <path d="M20 3 Q16 32 20 61" stroke-width="0.7" opacity="0.4" />
    <path d="M44 3 Q48 32 44 61" stroke-width="0.7" opacity="0.4" />
    <path d="M32 2 L32 62" stroke-width="0.6" opacity="0.35" />

    <!-- Surface panel detail -->
    <path d="M40 44 h10 v8 h-10 z" stroke-width="0.6" opacity="0.4" />
    <path d="M12 42 h8 v6 h-8 z" stroke-width="0.6" opacity="0.4" />
  </g>

  <!-- Superlaser dish -->
  <g fill="none">
    <circle cx="23" cy="22" r="10" fill="#141414" stroke="#2e2e2e" stroke-width="1.5" />
    <circle cx="23" cy="22" r="6.5" stroke="#3a3a3a" stroke-width="1" opacity="0.8" />
    <circle cx="23" cy="22" r="3" stroke="#3a3a3a" stroke-width="1" opacity="0.9" />
    <!-- Focusing emitters -->
    <circle cx="23" cy="16.5" r="0.9" fill="#5a5a5a" />
    <circle cx="18" cy="24" r="0.9" fill="#5a5a5a" />
    <circle cx="28" cy="24" r="0.9" fill="#5a5a5a" />
    <circle cx="23" cy="27" r="0.9" fill="#5a5a5a" />
  </g>
</svg>
